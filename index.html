<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luan Dias | Atleta Profissional</title>
    <style>
        /* Configurações de Atleta */
        :root {
            --cor-primaria: #ffde59; /* Amarelo Ouro */
            --cor-fundo: #0a0a0a;
            --cor-card: #161616;
            --fonte-titulo: 'Impact', 'Arial Black', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--cor-fundo);
            color: #ffffff;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Header com Efeito Visual */
        header {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(10,10,10,1)), 
                        url('https://images.unsplash.com/photo-1530549387631-fbb129c13d98?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .nome-atleta {
            font-family: var(--fonte-titulo);
            font-size: clamp(3rem, 10vw, 6rem);
            color: var(--cor-primaria);
            text-transform: uppercase;
            letter-spacing: -2px;
            line-height: 0.9;
            margin-bottom: 10px;
            font-style: italic;
            text-shadow: 4px 4px 0px rgba(0,0,0,0.5);
        }

        .tagline {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #ccc;
            border-top: 1px solid var(--cor-primaria);
            padding-top: 10px;
        }

        /* Seções de Conteúdo */
        section {
            padding: 80px 20px;
            max-width: 1100px;
            margin: 0 auto;
        }

        h2 {
            font-family: var(--fonte-titulo);
            font-size: 2.5rem;
            text-transform: uppercase;
            margin-bottom: 40px;
            border-left: 8px solid var(--cor-primaria);
